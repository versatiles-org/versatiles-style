<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
		<link rel="icon" type="image/png" href="/assets/images/versatiles-logo.png" />
		<script src="https://tiles.versatiles.org/assets/lib/maplibre-gl/maplibre-gl.js"></script>
		<link href="https://tiles.versatiles.org/assets/lib/maplibre-gl/maplibre-gl.css" rel="stylesheet" />
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: system-ui, sans-serif;
			}

			#controls {
				position: absolute;
				top: 10px;
				left: 10px;
				z-index: 1;
				background: rgba(255, 255, 255, 0.9);
				padding: 8px 12px;
				border-radius: 6px;
				box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
			}

			#controls select {
				font-size: 14px;
				padding: 4px 8px;
			}

			#map {
				position: absolute;
				top: 0;
				bottom: 0;
				width: 100%;
			}
		</style>
	</head>

	<body>
		<div id="controls">
			<select id="style-select"></select>
		</div>
		<div id="map"></div>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
